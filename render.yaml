# Render Blueprint – Recommerce Marketplace
# https://docs.render.com/blueprint-spec

databases:
  - name: recommerce-db
    plan: free
    databaseName: recommerce
    user: recommerce

services:
  # ── Express API ──────────────────────────────────────────
  - type: web
    name: recommerce-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: |
      cd packages/database && npm install --include=dev && npx prisma generate &&
      npx prisma db push --accept-data-loss &&
      cd ../../apps/api && npm install --include=dev && npm run build
    startCommand: cd apps/api && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: recommerce-db
          property: connectionString
      - key: REDIS_URL
        value: ""  # REQUIRED: Add your Upstash or Redis connection string here
      - key: CORS_ORIGIN
        value: "https://recommerce-web.onrender.com" # Should match the web-admin service URL

  # ── Next.js Frontend ────────────────────────────────────
  - type: web
    name: recommerce-web
    runtime: node
    plan: free
    rootDir: apps/web-admin
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: "https://recommerce-api.onrender.com/api"
