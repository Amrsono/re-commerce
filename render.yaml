# Render Blueprint – Recommerce Marketplace
# https://docs.render.com/blueprint-spec

databases:
  - name: makeuse-db
    plan: free
    databaseName: makeuse
    user: makeuse

services:
  # ── Express API ──────────────────────────────────────────
  - type: web
    name: makeuse-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: |
      cd packages/database && npm install --include=dev && npx prisma generate &&
      npx prisma migrate deploy || (npx prisma migrate resolve --applied 20260404141254_initial_and_scheduling && npx prisma migrate deploy) &&
      cd ../../apps/api && npm install --include=dev && npm run build
    startCommand: cd apps/api && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: makeuse-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "https://makeuse-web.onrender.com" # Should match the web-admin service URL

  # ── Next.js Frontend ────────────────────────────────────
  - type: web
    name: makeuse-web
    runtime: node
    plan: free
    rootDir: apps/web-admin
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: "https://makeuse-api.onrender.com/api"
